name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
      - claude/review-finance-app-plan-nj2zM
      - claude/fix-savings-transactions-ckXKG
    paths:
      - 'financa-app/**'
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necessário para git describe funcionar

      - name: Obter versão
        id: version
        run: echo "VERSION=$(git describe --tags --always --dirty=-dev)" >> $GITHUB_OUTPUT

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: ./financa-app
          push: true
          tags: ghcr.io/jpsbdm/financa-app:latest
          build-args: APP_VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
