version: '3.8'

services:
  app:
    build: .
    container_name: financa-app
    restart: unless-stopped
    volumes:
      - ./data:/data          # SQLite persiste aqui
    env_file:
      - .env.local
    ports:
      - '127.0.0.1:3000:3000' # Só localhost — NÃO exposta na internet
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: financa-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy

  watchtower:
    image: containrrr/watchtower
    container_name: financa-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 86400 --rolling-restart financa-app
